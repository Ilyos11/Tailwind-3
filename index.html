<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="./src/output.css">
</head>
<body>
    <!-- Nav Section -->
      <nav class="flex items-center justify-between px-6 py-4 bg-[#f3f3f3] font-sans">
        
        <div class="flex items-center space-x-8">

            <div class="flex items-center justify-center w-10 h-10 bg-black rounded-full">
                <span class="text-white font-bold text-lg">i8</span>
            </div>

            <ul class="hidden md:flex space-x-6 text-sm text-gray-700">
                <li class="hover:text-black cursor-pointer transition">About us</li>
                <li class="hover:text-black cursor-pointer transition">How it works</li>
                <li class="hover:text-black cursor-pointer transition">Pricing</li>
                <li class="hover:text-black cursor-pointer transition">FAQs</li>
            </ul>
        </div>

        
        <div class="flex items-center space-x-6">
            <a href="#" class="text-sm text-gray-700 hover:text-black transition">Login</a>
            <button class="bg-black text-white px-6 py-2 text-sm font-medium hover:bg-gray-800 transition">
                Sign Up
            </button>
        </div>
    </nav>




    <!-- Section 2-->
    <section class="max-w-7xl mx-auto px-6 py-12 md:py-24">
        <div class="flex flex-col md:flex-row items-center justify-between gap-12">
            
            <div class="w-full md:w-1/2 space-y-8">
                <h1 class="text-4xl md:text-6xl font-medium tracking-tight leading-tight text-black">
                    Always Track & <br> Analyze Your Business <br> Statistics To Succeed.
                </h1>
                
                <p class="text-gray-600 text-sm md:text-base max-w-md leading-relaxed">
                    A better way to manage your sales, team, clients & marketing 
                    — on a single platform. Powerful, affordable & easy.
                </p>

                <div class="flex flex-col sm:flex-row w-full max-w-md">
                    <input 
                        type="email" 
                        placeholder="Enter your email" 
                        class="flex-grow px-4 py-3 border border-gray-300 focus:outline-none focus:ring-1 focus:ring-black"
                    >
                    <button class="bg-black text-white px-8 py-3 text-sm font-medium hover:bg-gray-800 transition-colors mt-2 sm:mt-0">
                        Get started
                    </button>
                </div>

                <div class="flex items-center space-x-8 pt-4 grayscale opacity-70">
                    <img src="Icon Visa.png" alt="Visa" class="h-6">
                    <img src="Icon MasterCard.png" alt="Mastercard" class="h-6">
                    <img src="Icon Paypall.png" alt="PayPal" class="h-6">
                </div>
            </div>

            
            <div class="w-full md:w-1/2 flex justify-center md:justify-end">
                <img src="Human 1.png" alt="Business Illustration" class="max-w-full h-auto">
            </div>

        </div>
    </section>






</body>
</html>
